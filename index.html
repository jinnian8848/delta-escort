<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍔 麦当当点护+ | 三角洲行动护航</title>
<style>
:root {
  --bg:#0a0e14; --card:#141b24; --accent:#FFD700; --accent2:#FF6B35; --red:#e74c3c;
  --text:#e8e6e3; --sub:#8b959e; --border:#1e2a36; --tag:#1a3a2a;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
/* 顶部 */
.header { background:linear-gradient(135deg,#1a1a2e,#0f3460); border-bottom:2px solid var(--accent); position:sticky; top:0; z-index:100; }
.header-inner { max-width:1100px; margin:0 auto; padding:14px 20px; display:flex; justify-content:space-between; align-items:center; }
.logo { font-size:24px; font-weight:900; display:flex; align-items:center; gap:8px; }
.logo .m { color:var(--accent); }
.logo .sub { font-size:12px; color:var(--sub); font-weight:400; margin-left:8px; }
.cart-btn { background:var(--accent); color:#000; border:none; padding:10px 22px; border-radius:24px; font-size:15px; cursor:pointer; font-weight:800; position:relative; }
.cart-badge { position:absolute; top:-6px; right:-6px; background:var(--red); color:#fff; font-size:11px; min-width:20px; height:20px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
/* 英雄区 */
.hero { background:linear-gradient(180deg,#0f3460,#0a0e14); text-align:center; padding:30px 20px; border-bottom:2px solid rgba(255,215,0,.15); }
.hero h1 { font-size:28px; color:var(--accent); margin-bottom:6px; }
.hero p { color:var(--sub); font-size:14px; }
.hero .star-badge { display:inline-block; background:linear-gradient(135deg,#FFD700,#FF6B35); color:#000; padding:6px 16px; border-radius:16px; font-weight:800; font-size:13px; margin-top:10px; }
/* 主要 */
.main { max-width:1100px; margin:0 auto; padding:20px; }
/* 打手卡片 */
.section-title { font-size:20px; font-weight:800; margin:20px 0 14px; padding-left:14px; border-left:4px solid var(--accent); }
.guard-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
.guard-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; cursor:pointer; transition:.2s; position:relative; overflow:hidden; }
.guard-card:hover { border-color:var(--accent); transform:translateY(-3px); box-shadow:0 8px 30px rgba(255,215,0,.1); }
.guard-card.star { border-color:var(--accent); background:linear-gradient(135deg,#1a1a2e,#2a1a0a); }
.guard-card.star::before { content:'👑 魔王'; position:absolute; top:12px; right:12px; background:linear-gradient(135deg,#FFD700,#FF6B35); color:#000; padding:4px 10px; border-radius:10px; font-size:11px; font-weight:800; }
.guard-top { display:flex; gap:14px; align-items:center; }
.guard-avatar { width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:900; color:#fff; flex-shrink:0; }
.guard-info { flex:1; }
.guard-name { font-size:18px; font-weight:800; }
.guard-title { font-size:12px; color:var(--sub); margin:2px 0 4px; }
.guard-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
.tag { background:var(--tag); color:#4CAF50; font-size:10px; padding:3px 8px; border-radius:8px; border:1px solid rgba(76,175,80,.3); }
.tag.red { color:var(--red); border-color:rgba(231,76,60,.3); background:#2a1a1a; }
.guard-stats { display:flex; gap:16px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
.guard-stat { text-align:center; flex:1; }
.guard-stat .val { font-size:16px; font-weight:800; color:var(--accent); }
.guard-stat .label { font-size:10px; color:var(--sub); }
.guard-price-row { display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
.guard-price { font-size:20px; font-weight:900; color:var(--accent2); }
.guard-price .unit { font-size:12px; color:var(--sub); }
.guard-add { background:var(--accent2); color:#fff; border:none; padding:10px 20px; border-radius:20px; font-size:14px; font-weight:700; cursor:pointer; transition:.15s; }
.guard-add:hover { background:#e5551f; }
/* 服务选项 */
.service-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
.service-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition:.15s; }
.service-card:hover { border-color:var(--accent2); }
.service-card h4 { font-size:16px; margin-bottom:4px; }
.service-card .desc { font-size:12px; color:var(--sub); margin-bottom:8px; }
.service-card .price { font-size:18px; font-weight:800; color:var(--accent); }
/* 购物车侧边栏 */
.cart-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; display:none; }
.cart-overlay.open { display:block; }
.cart-panel { position:fixed; right:0; top:0; bottom:0; width:420px; max-width:100vw; background:#111820; z-index:201; display:flex; flex-direction:column; transform:translateX(100%); transition:.3s; border-left:1px solid var(--border); }
.cart-panel.open { transform:translateX(0); }
.cart-head { padding:18px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.cart-close { background:none; border:none; color:var(--sub); font-size:24px; cursor:pointer; }
.cart-list { flex:1; overflow-y:auto; padding:16px; }
.cart-empty { text-align:center; color:var(--sub); padding:60px 20px; }
.cart-item { display:flex; align-items:center; gap:12px; padding:12px; background:var(--card); border-radius:10px; margin-bottom:8px; }
.cart-item-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:900; flex-shrink:0; }
.cart-item-info { flex:1; }
.cart-item-name { font-weight:700; font-size:14px; }
.cart-item-type { font-size:11px; color:var(--sub); }
.cart-qty { display:flex; align-items:center; gap:8px; }
.cart-qty button { width:28px; height:28px; border-radius:50%; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-size:16px; }
.cart-qty span { font-weight:700; min-width:18px; text-align:center; }
.cart-item-price { font-weight:800; color:var(--accent2); text-align:right; min-width:70px; }
.cart-item-del { background:none; border:none; color:#666; cursor:pointer; font-size:16px; }
.cart-foot { padding:16px 20px; border-top:1px solid var(--border); }
.cart-total { display:flex; justify-content:space-between; font-size:20px; font-weight:900; margin-bottom:14px; }
.cart-checkout { width:100%; padding:14px; background:linear-gradient(135deg,#FFD700,#FF6B35); color:#000; border:none; border-radius:12px; font-size:16px; font-weight:800; cursor:pointer; }
/* 结算弹窗 */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:300; display:none; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:#141b24; border:1px solid var(--border); border-radius:16px; padding:28px; max-width:480px; width:90%; max-height:80vh; overflow-y:auto; }
.modal h2 { margin-bottom:4px; }
.modal .dim { color:var(--sub); font-size:13px; margin-bottom:16px; }
.modal label { display:block; font-weight:700; margin:12px 0 4px; font-size:14px; }
.modal input, .modal textarea { width:100%; padding:10px 14px; background:#0a0e14; border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; font-family:inherit; }
.modal textarea { height:70px; resize:vertical; }
.modal .summary { background:#0a0e14; border-radius:10px; padding:14px; margin:14px 0; font-size:13px; max-height:150px; overflow-y:auto; }
.modal .summary .line { display:flex; justify-content:space-between; padding:3px 0; }
.modal .summary .total-line { font-weight:900; border-top:1px solid var(--border); margin-top:6px; padding-top:6px; font-size:16px; color:var(--accent2); }
.btn-row { display:flex; gap:10px; margin-top:18px; }
.btn-submit { flex:1; padding:14px; background:linear-gradient(135deg,#FFD700,#FF6B35); color:#000; border:none; border-radius:12px; font-size:16px; font-weight:800; cursor:pointer; }
.btn-submit:disabled { opacity:.5; }
.btn-cancel { flex:1; padding:14px; background:rgba(255,255,255,.05); color:var(--sub); border:none; border-radius:12px; font-size:16px; cursor:pointer; }
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:14px 28px; border-radius:28px; font-weight:700; z-index:400; animation:td .3s; color:#fff; }
.toast.ok { background:#4CAF50; }
.toast.err { background:#e74c3c; }
@keyframes td { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@media (max-width:600px) { .guard-grid { grid-template-columns:1fr; } .cart-panel { width:100%; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">🍔 <span class="m">麦当当</span>点护<span class="m">+</span><span class="sub">三角洲行动·护航专家</span></div>
    <button class="cart-btn" onclick="toggleCart()">🛒 我的订单 <span class="cart-badge" id="cartBadge" style="display:none">0</span></button>
  </div>
</div>

<div class="hero">
  <h1>⚔️ 三角洲行动·精英护航</h1>
  <p>顶尖打手在线接单 · 安全高效 · 不满意全额退</p>
  <div class="star-badge">⭐ 店长推荐：翔子 — 明星魔王护，百场零差评</div>
</div>

<div class="main" id="main"></div>

<!-- 购物车 -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-head"><h3>🛒 护航清单</h3><button class="cart-close" onclick="toggleCart()">✕</button></div>
  <div class="cart-list" id="cartList"><div class="cart-empty">😎 还没选打手，快去看看</div></div>
  <div class="cart-foot">
    <div class="cart-total"><span>合计</span><span id="cartTotal">¥0</span></div>
    <button class="cart-checkout" onclick="openCheckout()">⚡ 立即下单</button>
  </div>
</div>

<!-- 结算弹窗 -->
<div class="modal-overlay" id="checkoutModal">
  <div class="modal">
    <h2>📋 确认订单</h2>
    <p class="dim">填写信息后提交，订单将发送至商家邮箱</p>
    <label>🎮 游戏ID</label>
    <input type="text" id="gameId" placeholder="请输入你的三角洲游戏ID">
    <label>📱 联系方式</label>
    <input type="text" id="customerContact" placeholder="微信/QQ/手机号">
    <label>📝 备注</label>
    <textarea id="customerNote" placeholder="特殊要求、时间安排等..."></textarea>
    <div class="summary" id="orderSummary"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeCheckout()">再想想</button>
      <button class="btn-submit" id="submitBtn" onclick="submitOrder()">📧 提交订单</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<script>
// ============ 打手数据 ============
const GUARDS = [
  { id:'xiangzi', name:'翔子', title:'魔王 · 百场零差评', avatar:'⚔️', color:'#FFD700',

    tags:['魔王','零差评','千场老兵','单排战神'], star:true, winRate:99, games:1800, rating:5.0, price:88.88 },
  { id:'qiangzong', name:'强总', title:'战术大师', avatar:'🦅', color:'#e74c3c',

    tags:['战术大师','职业背景','进攻型'], star:false, winRate:97, games:1200, rating:4.9, price:66.66 },
  { id:'wanfeng', name:'挽风', title:'狙击专家', avatar:'🎯', color:'#4CAF50',
    desc:'千里之外取敌首级，一把狙守住整条防线。老板只需要跟在后面捡装备就行。',
    tags:['狙击专家','防守型','耐心好'], star:false, winRate:96, games:950, rating:4.9, price:66.66 },
  { id:'kangshen', name:'康神', title:'全能战士', avatar:'🛡️', color:'#2196F3',
    desc:'远近皆可、攻防兼备的全能型打手，什么图都能打，什么老板都能带。',
    tags:['全能战士','适应力强','稳如老狗'], star:false, winRate:95, games:860, rating:4.8, price:66.66 },
  { id:'guanhuai', name:'关怀', title:'萌新导师', avatar:'💚', color:'#8BC34A',
    desc:'耐心满分，专门带新手老板入坑。边打边教，让老板不仅通关还学会技术。',
    tags:['萌新之友','耐心教学','话唠型'], star:false, winRate:93, games:620, rating:4.8, price:66.66 },
  { id:'laochijia', name:'老吃家', title:'老六之王', avatar:'🐺', color:'#607D8B',
    desc:'蹲点一蹲一个准，阴人一阴一个死。老板说他"比挂还稳"。擅长各种刁钻角度。',
    tags:['老六之王','蹲点专业户','出其不意'], star:false, winRate:94, games:780, rating:4.7, price:66.66 },
  { id:'fjj', name:'fjj', title:'冲分狂魔', avatar:'🔥', color:'#FF9800',
    desc:'一天不冲分浑身难受，三天上战神不是梦。效率极高的冲分机器，时间就是金钱。',
    tags:['冲分机器','效率极高','肝帝'], star:false, winRate:93, games:700, rating:4.7, price:66.66 },
  { id:'yaoshen', name:'yao神', title:'反应怪物', avatar:'⚡', color:'#9C27B0',
    desc:'年轻人手速拉满，1v4不在话下。枪法准到对面以为开了挂。年轻就是资本。',
    tags:['反应极快','枪法精准','年轻选手'], star:false, winRate:92, games:550, rating:4.7, price:66.66 },
  { id:'mowangyu', name:'魔王宇', title:'火力压制', avatar:'👹', color:'#F44336',
    desc:'喜欢正面硬刚，拿着最猛的枪冲最前面。老板在后面躺就完事了，他一个人打一个队。',
    tags:['火力压制','正面硬刚','莽夫型'], star:false, winRate:91, games:480, rating:4.6, price:66.66 },
  { id:'haizhen', name:'海震', title:'稳重老哥', avatar:'🌊', color:'#03A9F4',
    desc:'打法稳健，不急不躁，适合老板慢慢体验游戏。稳扎稳打型，不翻车。',
    tags:['稳扎稳打','不急不躁','体验型'], star:false, winRate:90, games:400, rating:4.6, price:66.66 },
  { id:'xiugou', name:'修勾', title:'身法达人', avatar:'🐕', color:'#FF5722',
    desc:'走位风骚身法灵活，敌人打不中他。老板说看他玩就像看杂技表演。',
    tags:['身法达人','走位风骚','观赏性强'], star:false, winRate:89, games:380, rating:4.6, price:66.66 },
  { id:'yuejie', name:'越姐', title:'唯一女将', avatar:'👸', color:'#E91E63',
    desc:'队里唯一的女打手，巾帼不让须眉。细心周到，女老板首选。',
    tags:['唯一女将','细心周到','女老板首选'], star:false, winRate:88, games:350, rating:4.6, price:66.66 },
  { id:'zhige', name:'志哥', title:'夜班专精', avatar:'🦉', color:'#3F51B5',
    desc:'夜猫子专精，深夜档主力。晚上11点后找他准没错，通宵不犯困。',
    tags:['夜班专精','通宵战士','深夜档'], star:false, winRate:88, games:320, rating:4.5, price:66.66 },
  { id:'nailong', name:'奶龙', title:'气氛担当', avatar:'🐉', color:'#00BCD4',
    desc:'边打边聊段子不断，让老板全程笑到通关。技术不差，气氛更好。',
    tags:['气氛担当','段子手','快乐游戏'], star:false, winRate:87, games:290, rating:4.5, price:66.66 },
  { id:'hanweizhe', name:'捍卫者', title:'防守铁壁', avatar:'🏰', color:'#795548',
    desc:'守点一绝，阵地战无敌。跟老板配合默契，守住一条线对面别想过。',
    tags:['防守铁壁','阵地战','默契配合'], star:false, winRate:86, games:260, rating:4.5, price:66.66 },
  { id:'haozhu', name:'豪猪', title:'新锐选手', avatar:'🦔', color:'#8D6E63',
    desc:'新加入的悍将，虽然入行时间短但进步神速。价格实惠，性价比首选。',
    tags:['新锐选手','进步神速','性价比高'], star:false, winRate:85, games:180, rating:4.4, price:66.66 },
  { id:'tezhongbing', name:'特种兵', title:'军方出身', avatar:'💂', color:'#556B2F',
    desc:'真人特种兵退役，战术素养一流。虽然游戏时长不长但实战经验丰富。',
    tags:['军方出身','战术素养','实战经验'], star:false, winRate:84, games:150, rating:4.4, price:66.66 },
];

// ============ 服务套餐 ============
const SERVICES = [
  { id:'single', name:'单局护航', desc:'1局 · 快速通关', price:0, unit:'起/局', note:'随打手价格浮动' },
  { id:'three', name:'三局套餐', desc:'3局 · 适合冲段位', price:0, unit:'起', note:'原价9折' },
  { id:'five', name:'五局套餐', desc:'5局 · 老板首选', price:0, unit:'起', note:'原价8折，送1次复盘' },
  { id:'ten', name:'十局大礼包', desc:'10局 · 最实惠', price:0, unit:'起', note:'原价7折，送2次复盘+全程录像' },
];

// ============ 渲染 ============
let cart = [];

function renderAll() {
  const main = document.getElementById('main');
  let html = '';

  // 打手
  html += '<div class="section-title">⚔️ 选择打手（点击选中的打手查看价格）</div>';
  html += '<div class="guard-grid">';
  GUARDS.forEach(g => {
    html += `
      <div class="guard-card${g.star?' star':''}" id="card-${g.id}">
        <div class="guard-top">
          <div class="guard-avatar" style="background:${g.color}">${g.avatar}</div>
          <div class="guard-info">
            <div class="guard-name">${g.name} ${g.star?'👑':''}</div>
            <div class="guard-title">${g.title}</div>
            <div class="guard-tags">${g.tags.map(t=>`<span class="tag${t.includes('零差评')||t.includes('战神')?' red':''}">${t}</span>`).join('')}</div>
          </div>
        </div>
        <p style="font-size:13px;color:var(--sub);margin-top:10px;line-height:1.5">${g.desc}</p>
        <div class="guard-stats">
          <div class="guard-stat"><div class="val">${g.winRate}%</div><div class="label">胜率</div></div>
          <div class="guard-stat"><div class="val">${g.games}</div><div class="label">场次</div></div>
          <div class="guard-stat"><div class="val">${g.rating.toFixed(1)}</div><div class="label">评分</div></div>
        </div>
        <div class="guard-price-row">
          <div class="guard-price">¥${g.price}<span class="unit"> /局</span></div>
          <button class="guard-add" onclick="addGuard('${g.id}')">+ 选TA护航</button>
        </div>
      </div>`;
  });
  html += '</div>';

  // 套餐
  html += '<div class="section-title">📦 护航套餐</div>';
  html += '<p style="color:var(--sub);font-size:12px;margin-bottom:12px">💡 先选打手再选套餐，最终价格 = 打手单价 × 局数 × 折扣</p>';
  html += '<div class="service-grid">';
  SERVICES.forEach(s => {
    html += `
      <div class="service-card" id="svc-${s.id}" onclick="selectService('${s.id}')">
        <h4>${s.name}</h4>
        <div class="desc">${s.desc}</div>
        <div class="desc">${s.note}</div>
      </div>`;
  });
  html += '</div>';

  main.innerHTML = html;
}

// ============ 购物车 ============
let selectedGuard = null;
let selectedService = null;

function addGuard(gid) {
  selectedGuard = GUARDS.find(g=>g.id===gid);
  updateServicePrices();
  showToast(`✅ 已选择 ${selectedGuard.avatar} ${selectedGuard.name} · ¥${selectedGuard.price}/局`,'ok');
  // 高亮
  document.querySelectorAll('.guard-card').forEach(c=>c.style.borderColor='var(--border)');
  const card = document.getElementById('card-'+gid);
  if (card) card.style.borderColor = 'var(--accent)';
}

function selectService(sid) {
  if (!selectedGuard) { showToast('请先选择打手！','err'); return; }
  selectedService = SERVICES.find(s=>s.id===sid);
  // 高亮
  document.querySelectorAll('.service-card').forEach(c=>c.style.borderColor='var(--border)');
  const svc = document.getElementById('svc-'+sid);
  if (svc) svc.style.borderColor = 'var(--accent2)';

  const price = calcPrice();
  cart.push({
    key: Date.now().toString(),
    guard: selectedGuard,
    service: selectedService,
    price: price,
    qty: 1,
  });
  selectedGuard = null; selectedService = null;
  updateServicePrices();
  updateCart();
  showToast(`🛒 已加入：${cart[cart.length-1].guard.name} · ${cart[cart.length-1].service.name} · ¥${price}`,'ok');
}

function calcPrice() {
  if (!selectedGuard || !selectedService) return 0;
  const base = selectedGuard.price;
  const discounts = { single:1, three:0.9, five:0.8, ten:0.7 };
  const counts = { single:1, three:3, five:5, ten:10 };
  return Math.floor(base * counts[selectedService.id] * discounts[selectedService.id]);
}

function updateServicePrices() {
  if (!selectedGuard) {
    SERVICES.forEach(s => {
      const el = document.getElementById('svc-'+s.id);
      if (el) { const d=el.querySelector('.desc'); if(d)d.textContent=s.desc; }
    });
    return;
  }
  const g = selectedGuard;
  const discounts = { single:1, three:0.9, five:0.8, ten:0.7 };
  const counts = { single:1, three:3, five:5, ten:10 };
  SERVICES.forEach(s => {
    const el = document.getElementById('svc-'+s.id);
    if (el) {
      const total = Math.floor(g.price * counts[s.id] * discounts[s.id]);
      el.querySelector('.desc').textContent = counts[s.id]+'局 · ¥'+total+'（原价¥'+g.price*counts[s.id]+'）';
    }
  });
}

function updateCart() {
  const badge = document.getElementById('cartBadge');
  const totalItems = cart.reduce((s,c)=>s+c.qty,0);
  badge.textContent = totalItems;
  badge.style.display = totalItems>0?'flex':'none';

  const total = cart.reduce((s,c)=>s+c.price*c.qty,0);
  document.getElementById('cartTotal').textContent = '¥'+total;

  const list = document.getElementById('cartList');
  if (cart.length===0) {
    list.innerHTML = '<div class="cart-empty">😎 还没选打手，快去看看</div>';
  } else {
    list.innerHTML = cart.map((c,i)=>`
      <div class="cart-item">
        <div class="cart-item-avatar" style="background:${c.guard.color}">${c.guard.avatar}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${c.guard.name} · ${c.service.name}</div>
          <div class="cart-item-type">${c.service.desc.replace(/\. /,' · ').replace('局 · ','局 · ¥')}</div>
        </div>
        <div class="cart-qty">
          <button onclick="chgQty(${i},-1)">−</button><span>${c.qty}</span><button onclick="chgQty(${i},1)">+</button>
        </div>
        <div class="cart-item-price">¥${c.price*c.qty}</div>
        <button class="cart-item-del" onclick="delItem(${i})">🗑</button>
      </div>
    `).join('');
  }
}

function chgQty(i,d) { cart[i].qty+=d; if(cart[i].qty<=0)cart.splice(i,1); updateCart(); }
function delItem(i) { cart.splice(i,1); updateCart(); }

function toggleCart() {
  const open = !document.getElementById('cartPanel').classList.contains('open');
  document.getElementById('cartPanel').classList.toggle('open',open);
  document.getElementById('cartOverlay').classList.toggle('open',open);
}

// ============ 结算 ============
function openCheckout() {
  if (!cart.length) { showToast('请先选择打手和套餐','err'); return; }
  document.getElementById('checkoutModal').classList.add('open');
  let html=''; let total=0;
  cart.forEach(c=>{ const s=c.price*c.qty; total+=s; html+=`<div class="line"><span>${c.guard.avatar} ${c.guard.name} · ${c.service.name} ×${c.qty}</span><span>¥${s}</span></div>`; });
  html+=`<div class="line total-line"><span>合计</span><span>¥${total}</span></div>`;
  document.getElementById('orderSummary').innerHTML=html;
  if (cartPanel.classList.contains('open')) toggleCart();
}
function closeCheckout() { document.getElementById('checkoutModal').classList.remove('open'); }

// ============ 提交 ============
function submitOrder() {
  const gid = document.getElementById('gameId').value.trim();
  const contact = document.getElementById('customerContact').value.trim();
  const note = document.getElementById('customerNote').value.trim();

  if (!gid) { showToast('请填写游戏ID','err'); return; }
  if (!contact) { showToast('请填写联系方式','err'); return; }
  if (!cart.length) { showToast('购物车是空的','err'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '📧 发送中...';

  let orderItems = ''; let total = 0;
  cart.forEach(c => { const s=c.price*c.qty; total+=s; orderItems += `${c.guard.avatar} ${c.guard.name} · ${c.service.name} ×${c.qty}局  ¥${s}\n`; });

  fetch('https://api.emailjs.com/api/v1.0/email/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      service_id: 'service_5260djm',
      template_id: 'template_fwg5ez2',
      user_id: 'C1nzh5iQ-W-9xdUGX',
      template_params: {
        customer_name: gid,
        customer_phone: contact,
        customer_note: note || '无',
        order_items: orderItems,
        total_price: '¥'+total,
        order_time: new Date().toLocaleString(),
      }
    })
  }).then(r => {
    if (r.ok) {
      showToast('✅ 订单已发送！商家会尽快联系你','ok');
      cart = []; updateCart(); closeCheckout();
      document.getElementById('gameId').value = '';
      document.getElementById('customerContact').value = '';
      document.getElementById('customerNote').value = '';
    } else {
      r.json().then(d => { throw new Error(d.message); });
    }
  }).catch(e => {
    showToast('⚠️ 发送失败: '+e.message,'err');
  }).finally(() => {
    btn.disabled = false; btn.textContent = '📧 提交订单';
  });
}

// ============ Toast ============
function showToast(m,t) {
  const el = document.createElement('div');
  el.className = 'toast '+t; el.textContent = m;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

// ============ 启动 ============
renderAll(); updateCart();
</script>
</body>
</html>
